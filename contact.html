<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Basic Web - Contact</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        header
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="hero" style="height: 120px;">
            <h1>お問合せページ</h1>
            <p>お気軽にお問合せください/p>
        </section>
        <section class="contact_form">
            <form>
                
                <label for="title">お問合せタイトル</label>
                <input type="text" id="title">
                <p class="error_message">お問合せタイトルを正しく入力して下さい。</p>

                <label for="email">Email</label>
                <input type="text" id="email">
                <p class="error_message">Emailを正しく入力して下さい。</p>

                <label for="message">お問合せ内容</label>
                <input type="text" id="message">
                <p class="error_message">お問合せ内容を正しく入力して下さい。</p>

                <button id="button">問合せる</button>
                
            </form>
        </section>
    </main>
    <footer>
        footer
    </footer>
</body>

</html>
