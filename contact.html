<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Basic Web - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .error_message { display: none; }
        .error_message.show { display: block; }
    </style>
</head>

<body class="flex flex-col min-h-screen">
    <header class="bg-gray-800 text-white flex justify-between items-center px-5 py-5">
        header
        <nav>
            <ul class="flex">
                <li><a href="index.html" class="text-white no-underline px-5 hover:text-gray-400">Home</a></li>
                <li><a href="contact.html" class="text-white no-underline px-5 hover:text-gray-400">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main class="flex-1">
        <section class="bg-gray-400 h-[120px] flex flex-col justify-center items-center">
            <h1 class="text-white text-[1.8rem]">お問合せページ</h1>
            <p class="text-white">お気軽にお問合せください</p>
        </section>
        <section>
            <form class="w-full max-w-[500px] mx-auto my-10 flex flex-col gap-2.5">

                <label for="title">お問合せタイトル</label>
                <input type="text" id="title" class="p-2 border border-gray-300">
                <p class="error_message text-red-600 text-xs" id="error_message_title">お問合せタイトルを正しく入力して下さい。</p>

                <label for="email">Email</label>
                <input type="text" id="email" class="p-2 border border-gray-300">
                <p class="error_message text-red-600 text-xs" id="error_message_email">Emailを正しく入力して下さい。</p>

                <label for="message">お問合せ内容</label>
                <textarea id="message" rows="5" class="p-2 border border-gray-300"></textarea>
                <p class="error_message text-red-600 text-xs" id="error_message_message">お問合せ内容を正しく入力して下さい。</p>

                <button id="button" type="button" class="mt-8 p-2.5 bg-gray-800 text-white hover:bg-gray-600 cursor-pointer">問合せる</button>

            </form>
        </section>
    </main>
    <footer class="bg-gray-800 text-white mt-10 py-5 text-center">
        footer
    </footer>
    <script src="./script.js"></script>
</body>

</html>
